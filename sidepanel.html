<!DOCTYPE html>
<html lang="fa" direction="rtl">
<head>
    <meta charset="UTF-8">
    <title>دستیار هوشمند پشتیبانی</title>
    <style>
        /* تزریق رسمی فونت استاندارد وزیر متن جهت خوانش بهینه */
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap');

        :root {
            --bg-main: #0b0f19; 
            --bg-glass-card: linear-gradient(135deg, rgba(30, 37, 54, 0.55) 0%, rgba(15, 20, 32, 0.8) 100%);
            --bg-input: rgba(11, 14, 22, 0.95);
            --border-glass: rgba(255, 255, 255, 0.07);
            --text-main: #cbd5e1;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-gold: #fbbf24;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --accent-purple: #c084fc;
        }

        body {
            margin: 0; padding: 0; box-sizing: border-box;
            background: var(--bg-main); color: var(--text-main);
            font-family: 'Vazirmatn', -apple-system, sans-serif;
            direction: rtl; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            user-select: none;
        }
        
        #panel-main-view { display: flex; flex-direction: column; height: 100vh; }
        
        /* 📌 کانتینر پین‌شده و چسبنده بالایی */
        .sticky-top-zone {
            position: sticky; top: 0; z-index: 1000;
            background: var(--bg-main); display: flex; flex-direction: column;
            gap: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-glass);
        }

        /* هدر مینی‌مال مجهز به متن کریستالی بنفش وب‌کیت */
        .assistant-header {
            background: rgba(11, 15, 25, 0.85);
            padding: 10px 16px; display: flex; justify-content: space-between;
            align-items: center; backdrop-filter: blur(12px);
        }
        
        .brand-ai-crystal {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            font-weight: 900; font-size: 23px; line-height: 1;
            background: linear-gradient(135deg, #c084fc 0%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .header-actions-group { display: flex; gap: 12px; align-items: center; }
        
        .main-agent-select {
            background: var(--bg-glass-card); border: 1px solid var(--border-glass);
            border-radius: 8px; color: #ffffff; padding: 6px 14px; font-size: 11.5px;
            outline: none; cursor: pointer; font-family: inherit; font-weight: 700;
            min-width: 145px; transition: all 0.2s;
        }
        .main-agent-select:focus { border-color: var(--accent-blue); }
        .main-agent-select option, .info-dropdown option { background: #111622 !important; color: #cbd5e1 !important; }

        .header-utility-zone { 
            display: flex; gap: 4px; align-items: center; 
            background: rgba(255,255,255,0.03); padding: 2px 6px; 
            border-radius: 8px; border: 1px solid var(--border-glass); 
        }
        
        .radar-select-mini {
            background: none; border: none; color: var(--text-main); font-size: 13px;
            outline: none; cursor: pointer; font-family: inherit; padding: 2px;
        }

        .header-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s; }
        .header-btn:hover { color: var(--accent-gold); }

        /* صندلی‌های شیشه‌ای پین‌شده کاربران */
        .slots-bar { margin: 0 14px; display: flex; gap: 6px; background: var(--bg-glass-card); padding: 4px; border-radius: 10px; border: 1px solid var(--border-glass); backdrop-filter: blur(10px); }
        .slot-tab {
            flex: 1; padding: 6px 4px; font-size: 11px; font-weight: 700; border-radius: 7px;
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 5px; transition: all 0.2s; font-family: inherit;
        }
        .slot-tab::before { content: ''; width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; display: inline-block; }
        .slot-tab.active { background: var(--accent-blue); color: #ffffff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .slot-tab.active::before { background: #ffffff; }

        /* کانتینر اصلی محتوای اسکرول‌شونده */
        .panel-container { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

        .gradient-glass-box {
            background: var(--bg-glass-card); border: 1px solid var(--border-glass);
            border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 12px;
            backdrop-filter: blur(12px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        /* 🛠️ مهار کامل بیرون‌زدگی نام مشتری با فونداسیون باکس‌مدل فشرده */
        .customer-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; box-sizing: border-box; }
        #issue-tag-select { min-width: 125px; max-width: 125px; }
        
        .customer-left-group { display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex: 1; min-width: 0; box-sizing: border-box; }
        .smoky-input {
            background: var(--bg-input); border: 1px solid var(--border-glass);
            border-radius: 8px; color: #f3f4f6; padding: 7px 10px; font-size: 11.5px;
            font-family: inherit; outline: none; transition: border-color 0.2s; user-select: text; 
            width: 100%; max-width: 110px; flex: 1; min-width: 0; box-sizing: border-box;
        }
        .smoky-input:focus { border-color: var(--accent-blue); }
        
        .info-dropdown {
            background: var(--bg-input); color: var(--text-main);
            border: 1px solid var(--border-glass); border-radius: 8px;
            padding: 7px 10px; font-size: 11.5px; outline: none;
            font-family: inherit; cursor: pointer; font-weight: 600; transition: all 0.2s;
            box-sizing: border-box;
        }
        #customer-gender-select { min-width: 80px; max-width: 80px; }

        /* کادرهای ورودی قفل شده روی ابعاد متوسط ثابت */
        .input-zone-title { font-size: 10.5px; color: var(--text-muted); font-weight: bold; padding-right: 2px; }
        .matrix-textarea {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-glass);
            border-radius: 8px; color: #f3f4f6; padding: 10px; font-size: 11.5px; direction: rtl;
            font-family: inherit; outline: none; box-sizing: border-box; user-select: text;
            height: 75px !important; min-height: 75px !important; max-height: 75px !important;
            resize: none !important; overflow-y: auto;
        }
        .matrix-textarea:focus { border-color: var(--accent-blue); }

        .action-btn {
            width: 100%; background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: #ffffff; border: none; padding: 12px; border-radius: 10px;
            font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15); font-family: inherit;
        }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35); }

        .output-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-glass); padding-bottom: 8px; }
        
        /* تغییر نام موفقیت‌آمیز به پاکسازی ذهن */
        .btn-wipe-slot { background: rgba(244, 63, 94, 0.1); color: var(--accent-red); border: 1px solid rgba(244, 63, 94, 0.15); border-radius: 6px; padding: 4px 10px; font-size: 10.5px; cursor: pointer; font-family: inherit; font-weight: bold; transition: all 0.2s; }
        .btn-wipe-slot:hover { background: var(--accent-red); color: #fff; }

        .output-left-controls-group { display: flex; gap: 10px; align-items: center; }

        .output-tabs { display: flex; gap: 6px; }
        .out-tab { background: none; border: none; color: var(--text-muted); font-size: 11.5px; font-weight: bold; padding: 4px 10px; cursor: pointer; border-radius: 5px; transition: all 0.2s; font-family: inherit; }
        .out-tab.active { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        
        .output-version-container { display: none; }
        .output-version-container.visible { display: block; }
        
        .suggestion-wrapper { position: relative; width: 100%; }
        
        /* 📐 چینش عمودی و متوازن آیکون‌ها بدون ریسک تداخل یا بیرون‌زدگی */
        .floating-box-actions {
            position: absolute; left: 10px; top: 12px;
            display: flex; flex-direction: column; gap: 6px; z-index: 5;
        }
        
        .pure-icon-copy-btn, .pure-icon-like-btn, .pure-icon-extend-btn {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-glass);
            color: var(--text-main); width: 26px; height: 26px; border-radius: 6px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); padding: 0;
        }
        .pure-icon-copy-btn:hover { color: var(--accent-gold); border-color: rgba(251, 191, 36, 0.3); }
        .pure-icon-copy-btn.copied { color: var(--accent-green) !important; border-color: rgba(16, 185, 129, 0.3) !important; background: rgba(16, 185, 129, 0.1) !important; }

        /* سنسور مینی‌مال لایک دودی متمایل به بنفش */
        .pure-icon-like-btn { color: var(--text-muted); }
        .pure-icon-like-btn:hover { border-color: rgba(192, 132, 252, 0.3); color: var(--accent-purple); }
        .pure-icon-like-btn.liked { color: var(--accent-purple) !important; border-color: rgba(192, 132, 252, 0.5) !important; background: rgba(168, 85, 247, 0.1) !important; }

        /* سنسور شلیک آنی گسترش کانتکست (فقط آیکون موشک بدون متن) */
        .pure-icon-extend-btn { color: var(--text-muted); }
        .pure-icon-extend-btn:hover { color: var(--accent-gold); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }

        /* 📐 افزایش ابعاد کادر و اعمال min-height جهت مهار صددرصدی ستون آیکون‌ها */
        .suggestion-box {
            background: var(--bg-input); border-right: 4px solid var(--accent-green);
            padding: 14px; padding-left: 48px; 
            border-radius: 8px; font-size: 12px; line-height: 1.8;
            color: #e5e7eb; min-height: 110px; max-height: 220px; overflow-y: auto; user-select: text !important;
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.02); transition: all 0.2s;
        }

        .archetype-row { display: flex; gap: 6px; overflow-x: auto; margin-top: 4px; padding-bottom: 2px; }
        .archetype-btn {
            background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid var(--border-glass);
            padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s; font-weight: 500;
        }
        .archetype-btn:hover { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .archetype-btn.normal { color: var(--accent-gold); border-color: rgba(251, 191, 36, 0.2); }
        .archetype-btn.normal:hover { background: var(--accent-gold); color: #111; }

        .history-header { font-size: 10.5px; color: var(--accent-gold); font-weight: bold; border-bottom: 1px dashed var(--border-glass); padding-bottom: 6px; margin-bottom: 6px; }
        #output-display-card { max-height: 440px; overflow-y: auto; user-select: text !important; padding-right: 4px; }
        
        .chat-bubble-user { margin-bottom: 10px; font-size: 11.5px; line-height: 1.7; color: var(--text-muted); border-right: 2px solid rgba(255,255,255,0.08); padding-right: 8px; user-select: text !important; }
        .chat-bubble-bot { margin-bottom: 10px; font-size: 11.5px; line-height: 1.7; color: #f3f4f6; border-right: 2px solid var(--accent-blue); padding-right: 8px; background: rgba(59, 130, 246, 0.03); padding: 8px; border-radius: 0 6px 6px 6px; user-select: text !important; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="panel-main-view">
        
        <div class="sticky-top-zone">
            <div class="assistant-header">
                <div class="brand-ai-crystal">Ai</div>
                <div class="header-actions-group">
                    <select class="main-agent-select" id="select-active-agent" title="هوش فعال شیفت">
                        <option value="gemini-3.1-flash-lite" selected>Gemini 3.1 Lite</option>
                        <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
                    </select>
                    <div class="header-utility-zone">
                        <select class="radar-select-mini" id="select-radar-mode" title="حالت پایش تاریخچه">
                            <option value="manual" selected>✍️</option>
                            <option value="auto">📡</option>
                        </select>
                        <button class="header-btn" id="btn-open-database" title="🗄️ دیتابیس ابری">🗄️</button>
                    </div>
                </div>
            </div>

            <div class="slots-bar">
                <button class="slot-tab active" id="slot-0" data-slot="0">کاربر ۱</button>
                <button class="slot-tab" id="slot-1" data-slot="1">کاربر ۲</button>
                <button class="slot-tab" id="slot-2" data-slot="2">کاربر ۳</button>
            </div>
        </div>

        <div class="panel-container">

            <div class="gradient-glass-box">
                <div class="customer-row">
                    <select id="issue-tag-select" class="info-dropdown">
                        <option value="">🏷️ موضوع چت...</option>
                        <option value="تاخیر واریز ریالی">تاخیر واریز ریالی</option>
                        <option value="فراموشی ممو">فراموشی ممو</option>
                        <option value="بلاک برداشت">بلاک برداشت</option>
                        <option value="احراز هویت">احراز هویت</option>
                        <option value="تعهدی">تعهدی</option>
                    </select>

                    <div class="customer-left-group">
                        <select id="customer-gender-select" class="info-dropdown">
                            <option value="male" selected>آقا</option>
                            <option value="female">خانم</option>
                            <option value="unknown">نامشخص</option>
                        </select>
                        <input type="text" id="customer-name-input" class="smoky-input" placeholder="نام مشتری...">
                    </div>
                </div>
            </div>

            <div class="gradient-glass-box">
                <label class="input-zone-title">📥 رادار تاریخچه (نویزگیر خودکار فعال):</label>
                <textarea class="matrix-textarea" id="history-raw-input" placeholder="کل تاریخچه تیکت را پیست کنید..."></textarea>
                
                <label class="input-zone-title">✍️ ایده خام یا پیش‌نویس شما (لوپ اصلاح زنده فعال):</label>
                <textarea class="matrix-textarea" id="draft-input" placeholder="کلمات کلیدی را بنویسید یا دستور اصلاح پاسخ قبل را صادر کنید..."></textarea>
            </div>

            <button class="action-btn" id="btn-trigger-analysis">🚀 تحلیل و فرمول‌بندی پاسخ</button>

            <div class="gradient-glass-box">
                <div class="output-header-row">
                    <button class="btn-wipe-slot" id="btn-wipe-current-slot" title="پاکسازی حافظه این صندلی">🧹 پاکسازی ذهن</button>
                    <div class="output-left-controls-group">
                        <div class="output-tabs">
                            <button class="out-tab" id="tab-quick">⚡ کوتاه</button>
                            <button class="out-tab active" id="tab-detailed">🔧 تشریحی</button>
                        </div>
                    </div>
                </div>
                
                <!-- نسخه کوتاه -->
                <div class="output-version-container" id="container-quick">
                    <div class="suggestion-wrapper">
                        <div class="floating-box-actions">
                            <button class="pure-icon-copy-btn" id="btn-copy-quick" title="کپی سریع">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                            <button class="pure-icon-like-btn" id="btn-like-quick" title="افزودن به پاسخ‌های طلایی">🖤</button>
                            <button class="pure-icon-extend-btn" id="btn-extend-quick" title="گسترش آنی این پاسخ">🚀</button>
                        </div>
                        <div class="suggestion-box" id="output-quick">منتظر دریافت اطلاعات...</div>
                    </div>
                </div>
                
                <!-- نسخه تشریحی (دیفالت شیفت) -->
                <div class="output-version-container visible" id="container-detailed">
                    <div class="suggestion-wrapper">
                        <div class="floating-box-actions">
                            <button class="pure-icon-copy-btn" id="btn-copy-detailed" title="کپی سریع">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                            <button class="pure-icon-like-btn" id="btn-like-detailed" title="افزودن به پاسخ‌های طلایی">🖤</button>
                            <button class="pure-icon-extend-btn" id="btn-extend-detailed" title="گسترش آنی این پاسخ">🚀</button>
                        </div>
                        <div class="suggestion-box" id="output-detailed">منتظر دریافت اطلاعات...</div>
                    </div>
                </div>

                <div class="archetype-row">
                    <button class="archetype-btn normal" data-archetype="normal">🔄 عادی</button>
                    <button class="archetype-btn" data-archetype="zeus">⚡ زئوس</button>
                    <button class="archetype-btn" data-archetype="hestia">🏠 هستیا</button>
                    <button class="archetype-btn" data-archetype="hades">🔮 هادس</button>
                </div>
            </div>

            <div class="gradient-glass-box" style="flex: 1;">
                <div class="history-header">📜 حافظه زنده و کانتکست (انتخاب و کپی آزاد):</div>
                <div id="output-display-card">
                    <div style="text-align: center; color: var(--text-muted); font-size: 11px; padding: 15px;">حافظه این صندلی پاک و آماده است.</div>
                </div>
            </div>

        </div>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
